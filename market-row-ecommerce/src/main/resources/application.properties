# Server (only used if you ever run this as "java -jar" locally — under Tomcat 9,
# Tomcat's own connector port, typically 8080, is what actually matters)
server.port=8080

# H2 file-based database - data survives restarts, no external DB server required.
# The DB file is created in a ./data folder relative to where you run the jar.
spring.datasource.url=jdbc:h2:file:./data/marketrowdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.show-sql=false

# (Optional) H2 web console - handy for debugging, disable in production if desired
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=true

# File upload limits (in case you later add product image uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# App info
spring.application.name=market-row-ecommerce
