<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Your Cart - Market Row</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<div class="container">
    <h1 class="section-title">Your Cart</h1>

    <div th:if="${cart.isEmpty()}" class="empty-state">
        <p>Your cart is empty.</p>
        <a href="/" class="btn btn-primary">Continue Shopping</a>
    </div>

    <div th:unless="${cart.isEmpty()}">
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr class="cart-item-row" th:each="entry : ${cart.items}">
                    <td style="display:flex;align-items:center;gap:12px;">
                        <img th:src="${entry.value.imageUrl}" th:alt="${entry.value.productName}" />
                        <span class="cart-item-name" th:text="${entry.value.productName}">Product name</span>
                    </td>
                    <td>₹<span th:text="${#numbers.formatDecimal(entry.value.price, 1, 'COMMA', 2, 'POINT')}">0.00</span></td>
                    <td>
                        <form th:action="@{/cart/update}" method="post" style="display:flex;gap:6px;">
                            <input type="hidden" name="productId" th:value="${entry.key}" />
                            <input type="number" name="quantity" th:value="${entry.value.quantity}" min="1" class="qty-input" style="margin:0;" />
                            <button type="submit" class="btn btn-outline btn-sm">Update</button>
                        </form>
                    </td>
                    <td>₹<span th:text="${#numbers.formatDecimal(entry.value.subtotal, 1, 'COMMA', 2, 'POINT')}">0.00</span></td>
                    <td>
                        <form th:action="@{/cart/remove}" method="post">
                            <input type="hidden" name="productId" th:value="${entry.key}" />
                            <button type="submit" class="btn btn-outline btn-sm">Remove</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="cart-summary">
            <div class="total-row">
                <span>Total</span>
                <span>₹<span th:text="${#numbers.formatDecimal(cart.total, 1, 'COMMA', 2, 'POINT')}">0.00</span></span>
            </div>
            <a href="/checkout" class="btn btn-accent btn-block">Proceed to Checkout</a>
            <a href="/" class="btn btn-outline btn-block" style="margin-top:10px;">Continue Shopping</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
