<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Market Row - Shop Everything You Need</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<section class="hero">
    <h1>Everything You Need, All In One Row</h1>
    <p>Shop Electronics, Fashion, Home &amp; Kitchen, Books, Sports and Beauty essentials.</p>
</section>

<div class="container">

    <h2 class="section-title">Shop by Category</h2>
    <div class="category-grid">
        <a class="category-card" th:each="c : ${categories}" th:href="@{'/category/' + ${c.slug}}">
            <img th:src="${c.imageUrl}" th:alt="${c.name}" />
            <div class="cat-name" th:text="${c.name}">Category</div>
        </a>
    </div>

    <h2 class="section-title">Featured Products</h2>
    <div class="product-grid">
        <div class="product-card" th:each="p : ${featuredProducts}">
            <a th:href="@{'/product/' + ${p.id}}">
                <img th:src="${p.imageUrl}" th:alt="${p.name}" />
            </a>
            <div class="product-info">
                <a th:href="@{'/product/' + ${p.id}}" class="product-name" th:text="${p.name}">Product name</a>
                <div class="price-tag"><span class="currency">₹</span><span th:text="${#numbers.formatDecimal(p.price, 1, 'COMMA', 2, 'POINT')}">0.00</span></div>
                <span class="stock-badge" th:classappend="${p.inStock} ? 'in' : 'out'"
                      th:text="${p.inStock} ? 'In Stock' : 'Out of Stock'">In Stock</span>
                <form th:action="@{/cart/add}" method="post">
                    <input type="hidden" name="productId" th:value="${p.id}" />
                    <input type="hidden" name="quantity" value="1" />
                    <input type="hidden" name="redirectTo" value="/" />
                    <button type="submit" class="btn btn-primary btn-block" th:disabled="${!p.inStock}">Add to Cart</button>
                </form>
            </div>
        </div>
    </div>

</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
