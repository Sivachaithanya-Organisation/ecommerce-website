<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${product.name} + ' - Market Row'">Product - Market Row</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<div class="container">
    <div class="product-detail">
        <img th:src="${product.imageUrl}" th:alt="${product.name}" />
        <div>
            <a th:href="@{'/category/' + ${product.category.slug}}" style="color:#1c6e4a;font-size:13px;font-weight:600;">
                &larr; Back to <span th:text="${product.category.name}">Category</span>
            </a>
            <h1 th:text="${product.name}">Product name</h1>
            <span class="stock-badge" th:classappend="${product.inStock} ? 'in' : 'out'"
                  th:text="${product.inStock} ? ('In Stock (' + ${product.stockQuantity} + ' available)') : 'Out of Stock'">In Stock</span>
            <div class="price-tag"><span class="currency">₹</span><span th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}">0.00</span></div>
            <p class="desc" th:text="${product.description}">Product description goes here.</p>

            <form th:action="@{/cart/add}" method="post" th:if="${product.inStock}">
                <input type="hidden" name="productId" th:value="${product.id}" />
                <input type="hidden" name="redirectTo" th:value="'/product/' + ${product.id}" />
                <label for="quantity" style="font-size:13px;font-weight:600;margin-right:8px;">Quantity</label>
                <input type="number" id="quantity" name="quantity" value="1" min="1" th:max="${product.stockQuantity}" class="qty-input" />
                <button type="submit" class="btn btn-accent">Add to Cart</button>
            </form>
            <p th:unless="${product.inStock}" style="color:#c0392b;font-weight:600;">This item is currently out of stock.</p>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
